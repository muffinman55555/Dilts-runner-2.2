
<style>
  * { box-sizing: border-box; touch-action: manipulation; }
  #game-wrap { display: flex; flex-direction: column; align-items: center; padding: 0.5rem 0; font-family: var(--font-sans); width: 100%; }
  #canvas { display: block; width: 100%; max-width: 600px; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); }
  #hud { display: flex; justify-content: space-between; width: 100%; max-width: 600px; margin-bottom: 8px; font-size: 13px; color: var(--color-text-secondary); padding: 0 2px; }
  #hud span { font-weight: 600; color: var(--color-text-primary); }
  #powerup-bar { width: 100%; max-width: 600px; height: 28px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; padding: 0 2px; }
  #powerup-label { font-size: 12px; color: var(--color-text-secondary); min-width: 120px; }
  #powerup-track { flex: 1; height: 6px; background: var(--color-bg-tertiary); border-radius: 3px; overflow: hidden; }
  #powerup-fill { height: 100%; width: 0%; border-radius: 3px; transition: background 0.3s; }
  #jump-btn { width: 100%; max-width: 600px; height: 56px; background: rgba(58,122,191,0.15); border: 1.5px solid rgba(58,122,191,0.35); border-radius: 12px; font-size: 15px; color: var(--color-text-secondary); cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; margin-top: 8px; }
  #jump-btn:active { background: rgba(58,122,191,0.28); }
  #msg { margin-top: 6px; font-size: 11px; color: var(--color-text-tertiary); text-align: center; }
</style>
<div id="game-wrap">
  <div id="hud">
    <div>Score: <span id="score-val">0</span></div>
    <div>Best: <span id="best-val">0</span></div>
    <div>Level: <span id="level-val">1</span></div>
  </div>
  <div id="powerup-bar">
    <div id="powerup-label">No power-up</div>
    <div id="powerup-track"><div id="powerup-fill"></div></div>
  </div>
  <canvas id="canvas" width="600" height="220"></canvas>
  <button id="jump-btn">⬆ TAP TO JUMP</button>
  <div id="msg">✨ Golden ghost = ultra rare · 🛡 Shield absorbs one hit · ⚠️ Watch out for fakes</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 600, H = 220, GROUND = H - 40;

const POWERUPS = [
  { id:'triple',   label:'🦘 Triple Jump',  color:'#44bbff', glow:'#88ddff', duration:10000 },
  { id:'timewarp', label:'⏱ Time Warp',     color:'#aa44ff', glow:'#cc88ff', duration:10000 },
  { id:'shield',   label:'🛡 Shield',        color:'#ffcc00', glow:'#ffe88a', duration:0 },
  { id:'magnet',   label:'🧲 Score Magnet',  color:'#ff6644', glow:'#ffaa88', duration:10000 },
];
const GHOST = { id:'ghost', label:'👻 Ghost Mode', color:'#ffd700', glow:'#ffe87a', duration:10000 };
const FAKE  = { id:'fake',  label:'☠️ NOPE',       color:'#dd1111', glow:'#ff4444' };

const labBg = {
  shelfItems: Array.from({length:8},(_,i)=>({x:i*80+20,type:['bottle','bottle','flask','testube','testube'][i%5],color:['#44bbaa','#6655dd','#dd8844','#dd4444','#44bb66'][i%5],liquid:0.3+Math.random()*0.5})),
  bubbles: Array.from({length:12},()=>({x:Math.random()*W,y:GROUND-10-Math.random()*60,r:2+Math.random()*5,speed:0.3+Math.random()*0.5,alpha:0.15+Math.random()*0.2}))
};

let state, raf;

function makePepperGroup(){
  const count=Math.ceil(Math.random()*10);
  const peppers=[];let offsetX=0;
  for(let i=0;i<count;i++){
    const tall=Math.random()<0.22,w=13+Math.random()*5|0;
    const h=tall?62+Math.random()*28|0:20+Math.random()*16|0;
    peppers.push({dx:offsetX,w,h,color:Math.random()<0.6?'red':(Math.random()<0.5?'orange':'green')});
    offsetX+=w+3+Math.random()*5;
  }
  return {x:W+10,peppers,groupW:offsetX};
}

function makePowerUp(){
  const roll=Math.random();
  let def,fake=false;
  if(roll<0.05){ def=GHOST; }
  else if(roll<0.25){ def=FAKE; fake=true; }
  else { def=POWERUPS[Math.floor(Math.random()*POWERUPS.length)]; }
  const floatY=GROUND-70-Math.random()*30;
  return {x:W+20,y:floatY,def,r:14,angle:0,collected:false,fake,isGhost:def.id==='ghost'};
}

function initState(){
  return {
    running:false,over:false,score:0,
    best:state?state.best:0,
    frame:0,speed:4,
    player:{x:80,y:GROUND,vy:0,jumps:0,maxJumps:2,w:26,h:36},
    groups:[],trails:[],powerUpItems:[],
    nextGroup:90+Math.random()*60,
    nextPowerUp:400+Math.random()*300,
    level:1,
    activePowerUp:null,   // timer-based power-ups only (not shield)
    shieldActive:false,   // completely independent flag
    shieldCooldown:0,     // frames of invincibility after shield breaks (prevents double-hit)
    particles:[],
    deathFlash:0,
    goldFlash:0,
  };
}
state=initState();

function jump(){
  if(state.over){state=initState();state.running=true;startLoop();return;}
  if(!state.running){state.running=true;startLoop();return;}
  const maxJ=state.activePowerUp?.def.id==='triple'?3:2;
  if(state.player.jumps<maxJ){state.player.vy=-12;state.player.jumps++;}
}

document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}});
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
canvas.addEventListener('click',jump);
document.getElementById('jump-btn').addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
document.getElementById('jump-btn').addEventListener('click',jump);

function startLoop(){if(raf)cancelAnimationFrame(raf);loop();}
function loop(){update();draw();if(!state.over)raf=requestAnimationFrame(loop);}

function spawnParticles(x,y,color,count=12){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2,speed=2+Math.random()*4;
    state.particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-1,color,life:35,maxLife:35,r:3+Math.random()*3});
  }
}

function updatePowerUpHUD(){
  const label=document.getElementById('powerup-label');
  const fill=document.getElementById('powerup-fill');
  // Shield shown first if active (it's passive, no timer)
  if(state.shieldActive){
    label.textContent='🛡 Shield';
    fill.style.width='100%';
    fill.style.background='#ffcc00';
  } else if(state.activePowerUp){
    const remaining=state.activePowerUp.endsAt-Date.now();
    const pct=Math.max(0,remaining/state.activePowerUp.def.duration*100);
    label.textContent=state.activePowerUp.def.label;
    fill.style.width=pct+'%';
    fill.style.background=state.activePowerUp.def.color;
  } else {
    label.textContent='No power-up';
    fill.style.width='0%';
  }
}

function doGameOver(){
  if(state.over)return;
  state.over=true;
  if(state.score>state.best)state.best=state.score;
  document.getElementById('best-val').textContent=Math.floor(state.best/3);
}

function checkCollision(p,px,py,pw,ph){
  const pad=3;
  return p.x+p.w-pad>px+pad && p.x+pad<px+pw-pad &&
         p.y+p.h-pad>py+pad && p.y+pad<py+ph-pad;
}

function update(){
  state.frame++;
  const isTimewarp=state.activePowerUp?.def.id==='timewarp';
  const isMagnet  =state.activePowerUp?.def.id==='magnet';
  const isGhost   =state.activePowerUp?.def.id==='ghost';
  const speedMult =isTimewarp?0.4:1;
  const gravity   =isTimewarp?0.30:0.58;

  state.score+=isMagnet?3:1;
  state.level=Math.floor(state.score/300)+1;
  state.speed=(4+state.level*0.5)*speedMult;

  if(state.activePowerUp&&Date.now()>state.activePowerUp.endsAt){
    state.activePowerUp=null; state.player.maxJumps=2;
  }
  if(state.shieldCooldown>0)state.shieldCooldown--;

  const p=state.player;
  p.vy+=gravity; p.y+=p.vy;
  if(p.y>=GROUND){p.y=GROUND;p.vy=0;p.jumps=0;}

  state.trails.push({x:p.x+p.w/2,y:p.y+p.h/2,life:10});
  state.trails=state.trails.filter(t=>t.life-->0);

  for(let s of labBg.shelfItems){s.x-=0.5*speedMult;if(s.x<-40)s.x=W+20;}
  for(let b of labBg.bubbles){b.y-=b.speed*(isTimewarp?0.15:1);if(b.y<10){b.y=GROUND-5;b.x=Math.random()*W;}}

  state.nextGroup-=speedMult;
  if(state.nextGroup<=0){
    state.groups.push(makePepperGroup());
    const gap=Math.max(55,120-state.level*6);
    state.nextGroup=gap+Math.random()*55;
  }
  for(let g of state.groups)g.x-=state.speed;

  // --- Collision detection ---
  if(!isGhost && state.shieldCooldown===0){
    let hitThisFrame=false;
    for(let g of state.groups){
      if(hitThisFrame)break;
      for(let pep of g.peppers){
        const py=GROUND+28-pep.h;
        if(checkCollision(p, g.x+pep.dx, py, pep.w, pep.h)){
          hitThisFrame=true;
          if(state.shieldActive){
            // Shield breaks — grant invincibility frames so we don't re-hit next frame
            state.shieldActive=false;
            state.shieldCooldown=40;
            spawnParticles(p.x+p.w/2,p.y+p.h/2,'#ffcc00',24);
            spawnParticles(p.x+p.w/2,p.y+p.h/2,'#fff',10);
            p.vy=-6; // small bounce up to clear
          } else {
            doGameOver();
          }
          break;
        }
      }
    }
  }
  state.groups=state.groups.filter(g=>g.x+g.groupW>-20);

  // --- Power-up spawning & collection ---
  state.nextPowerUp-=speedMult;
  if(state.nextPowerUp<=0){
    state.powerUpItems.push(makePowerUp());
    state.nextPowerUp=500+Math.random()*400;
  }
  for(let pu of state.powerUpItems){
    pu.x-=state.speed; pu.angle+=pu.isGhost?0.07:0.04;
    if(!pu.collected){
      if(p.x+p.w>pu.x-pu.r && p.x<pu.x+pu.r && p.y<pu.y+pu.r && p.y+p.h>pu.y-pu.r){
        pu.collected=true;
        if(pu.fake){
          state.deathFlash=18;
          spawnParticles(pu.x,pu.y,'#ff2200',28);
          spawnParticles(p.x+p.w/2,p.y+p.h/2,'#ff4400',20);
          setTimeout(()=>doGameOver(),300);
        } else if(pu.def.id==='shield'){
          // Shield is purely a flag — never touches activePowerUp
          state.shieldActive=true;
          spawnParticles(pu.x,pu.y,'#ffcc00',20);
        } else {
          // All other timed power-ups
          state.activePowerUp={def:pu.def,endsAt:Date.now()+pu.def.duration};
          state.player.maxJumps=pu.def.id==='triple'?3:2;
          if(pu.isGhost){
            state.goldFlash=22;
            for(let i=0;i<5;i++) spawnParticles(pu.x+(Math.random()-0.5)*40,pu.y+(Math.random()-0.5)*20,'#ffd700',16);
          } else {
            spawnParticles(pu.x,pu.y,pu.def.color,20);
          }
        }
      }
    }
  }
  state.powerUpItems=state.powerUpItems.filter(pu=>pu.x>-40&&!pu.collected);

  for(let pt of state.particles){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;pt.life--;}
  state.particles=state.particles.filter(pt=>pt.life>0);
  if(state.deathFlash>0)state.deathFlash--;
  if(state.goldFlash>0)state.goldFlash--;

  document.getElementById('score-val').textContent=Math.floor(state.score/3);
  document.getElementById('level-val').textContent=state.level;
  updatePowerUpHUD();
}

// ---- Draw helpers (unchanged) ----
function drawShelfItem(x,y,type,color,liquid){
  ctx.globalAlpha=0.7;
  if(type==='testube'){
    ctx.fillStyle='rgba(220,235,245,0.5)';ctx.beginPath();ctx.roundRect(x,y,8,20,[4,4,4,4]);ctx.fill();
    ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(x,y+20*(1-liquid),8,20*liquid,[0,0,4,4]);ctx.fill();
    ctx.strokeStyle='#aabbc8';ctx.lineWidth=0.5;ctx.strokeRect(x,y,8,20);
  }else if(type==='bottle'){
    ctx.fillStyle='rgba(220,235,245,0.5)';ctx.fillRect(x+2,y,10,3);
    ctx.beginPath();ctx.roundRect(x,y+3,14,22,3);ctx.fill();
    ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(x,y+3+22*(1-liquid),14,22*liquid,[0,0,3,3]);ctx.fill();
    ctx.strokeStyle='#aabbc8';ctx.lineWidth=0.5;ctx.strokeRect(x,y+3,14,22);
  }else{
    ctx.fillStyle='rgba(220,235,245,0.5)';
    ctx.beginPath();ctx.moveTo(x+6,y);ctx.lineTo(x+2,y+8);ctx.lineTo(x,y+22);ctx.lineTo(x+12,y+22);ctx.lineTo(x+10,y+8);ctx.lineTo(x+6,y);ctx.fill();
    ctx.fillStyle=color;ctx.globalAlpha=0.7*liquid;
    ctx.beginPath();ctx.moveTo(x+3,y+14);ctx.lineTo(x+1,y+22);ctx.lineTo(x+11,y+22);ctx.lineTo(x+9,y+14);ctx.fill();
    ctx.globalAlpha=0.7;ctx.strokeStyle='#aabbc8';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(x+6,y);ctx.lineTo(x+2,y+8);ctx.lineTo(x,y+22);ctx.lineTo(x+12,y+22);ctx.lineTo(x+10,y+8);ctx.lineTo(x+6,y);ctx.stroke();
  }ctx.globalAlpha=1;
}
function drawErlenmeyer(x,y,w,h,color,fill,frame){
  const bub=Math.sin(frame*0.04)*1.5;ctx.globalAlpha=0.55;
  ctx.fillStyle='rgba(210,230,240,0.4)';ctx.beginPath();ctx.moveTo(x+w*0.35,y);ctx.lineTo(x+w*0.65,y);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.closePath();ctx.fill();
  ctx.fillStyle=color;const fy=y+h*(1-fill)+bub;
  ctx.beginPath();ctx.moveTo(x+w*(0.5-0.5*fill),fy);ctx.lineTo(x+w*(0.5+0.5*fill),fy);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#88aabb';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+w*0.35,y);ctx.lineTo(x+w*0.65,y);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.closePath();ctx.stroke();
  ctx.fillStyle='#88aabb';ctx.fillRect(x+w*0.38,y-6,w*0.24,7);ctx.globalAlpha=1;
}
function drawBeaker(x,y,w,h,color,fill,frame){
  const bub=Math.sin(frame*0.06+1)*1.2;ctx.globalAlpha=0.5;
  ctx.fillStyle='rgba(210,230,240,0.4)';ctx.beginPath();ctx.roundRect(x,y,w,h,[2,2,4,4]);ctx.fill();
  ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(x,y+h*(1-fill)+bub,w,h*fill,[0,0,4,4]);ctx.fill();
  ctx.strokeStyle='#88aabb';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
  ctx.fillStyle='#88aabb';ctx.fillRect(x+w-6,y-3,8,4);ctx.globalAlpha=1;
}
function drawDNA(x,y,frame){
  ctx.globalAlpha=0.35;const t=frame*0.03;
  for(let i=0;i<12;i++){
    const fy=y+i*10,x1=x+Math.sin(i*0.9+t)*14,x2=x+Math.sin(i*0.9+t+Math.PI)*14;
    ctx.strokeStyle='#4488cc';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x1,fy,3,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#cc4488';ctx.beginPath();ctx.arc(x2,fy,3,0,Math.PI*2);ctx.stroke();
    if(i<11){ctx.strokeStyle='#888899';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(x1,fy);ctx.lineTo(x2,fy);ctx.stroke();}
  }ctx.globalAlpha=1;
}
function drawMicroscope(x,y){
  ctx.globalAlpha=0.45;ctx.fillStyle='#334455';
  ctx.fillRect(x+8,y+30,14,6);ctx.fillRect(x+12,y+10,6,22);ctx.fillRect(x+6,y+8,10,5);
  ctx.beginPath();ctx.ellipse(x+11,y+6,8,5,-0.3,0,Math.PI*2);ctx.fill();ctx.fillRect(x+13,y+26,10,3);
  ctx.fillStyle='#667788';ctx.beginPath();ctx.ellipse(x+11,y+2,4,3,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
}
function drawPetri(x,y){
  ctx.globalAlpha=0.4;ctx.fillStyle='rgba(210,235,220,0.6)';
  ctx.beginPath();ctx.ellipse(x,y,22,8,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#88bbaa';ctx.lineWidth=0.8;ctx.beginPath();ctx.ellipse(x,y,22,8,0,0,Math.PI*2);ctx.stroke();
  [{dx:5,dy:1,r:4,c:'#55aa66'},{dx:-8,dy:-1,r:3,c:'#aa5566'},{dx:0,dy:2,r:5,c:'#6688aa'}].forEach(c=>{
    ctx.fillStyle=c.c;ctx.globalAlpha=0.35;ctx.beginPath();ctx.ellipse(x+c.dx,y+c.dy,c.r,c.r*0.4,0,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;
}
function drawLabBackground(frame){
  ctx.fillStyle='#e8ecf0';ctx.fillRect(0,0,W,GROUND+26);
  ctx.strokeStyle='#d0d6dd';ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GROUND+26);ctx.stroke();}
  for(let y=0;y<GROUND+26;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.fillStyle='#c8cdd4';ctx.fillRect(0,12,W,8);ctx.fillStyle='#b0b6be';ctx.fillRect(0,20,W,2);
  for(let s of labBg.shelfItems)drawShelfItem(s.x,14,s.type,s.color,s.liquid);
  ctx.fillStyle='#2a3540';ctx.fillRect(0,GROUND+26,W,6);ctx.fillStyle='#1e2830';ctx.fillRect(0,GROUND+30,W,4);
  ctx.fillStyle='#33424f';ctx.fillRect(0,GROUND+24,W,3);
  drawErlenmeyer(490,38,38,52,'#33bbaa',0.45,frame);
  drawBeaker(420,48,28,40,'#7744dd',0.55,frame);
  drawDNA(200,15,frame);drawMicroscope(28,GROUND-50);drawPetri(140,GROUND-18);
  for(let b of labBg.bubbles){
    ctx.strokeStyle=`rgba(80,180,200,${b.alpha})`;ctx.lineWidth=0.8;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
  }
  ctx.fillStyle='#bfc6cc';ctx.fillRect(0,GROUND+34,W,H-GROUND-34);
  ctx.strokeStyle='#adb4bb';ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,GROUND+34);ctx.lineTo(x,H);ctx.stroke();}
  ctx.fillStyle='#8a9299';ctx.fillRect(0,GROUND+26,W,1);
}
function drawPowerUpItem(pu,frame){
  const {x,y,r,def,angle,fake,isGhost}=pu;
  ctx.save();
  const outerR=isGhost?r*3:r*2.2;
  if(isGhost){
    const pulse=0.7+Math.sin(frame*0.1)*0.3;
    const grd=ctx.createRadialGradient(x,y,r*0.2,x,y,outerR*pulse);
    grd.addColorStop(0,'rgba(255,215,0,0.7)');grd.addColorStop(0.5,'rgba(255,180,0,0.25)');grd.addColorStop(1,'rgba(255,215,0,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(x,y,outerR*pulse,0,Math.PI*2);ctx.fill();
    for(let ri=0;ri<3;ri++){
      const rp=(frame*0.04+ri*2.1)%(Math.PI*2);
      ctx.strokeStyle=`rgba(255,220,50,${0.15+ri*0.08})`;ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(x,y,r+4+ri*6+Math.sin(rp)*3,0,Math.PI*2);ctx.stroke();
    }
  } else {
    const grd=ctx.createRadialGradient(x,y,r*0.2,x,y,outerR);
    grd.addColorStop(0,def.color+'bb');grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(x,y,outerR,0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle=def.color;ctx.lineWidth=isGhost?3:fake?2.5:2;ctx.globalAlpha=isGhost?1:0.85;
  ctx.beginPath();ctx.arc(x,y,r+2,angle*2,angle*2+Math.PI*1.3);ctx.stroke();
  ctx.beginPath();ctx.arc(x,y,r+2,angle*2+Math.PI,angle*2+Math.PI*2.3);ctx.stroke();
  if(isGhost){
    ctx.strokeStyle='rgba(255,240,100,0.6)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(x,y,r+5,-angle*1.5,-angle*1.5+Math.PI*1.6);ctx.stroke();
  }
  ctx.globalAlpha=1;
  if(isGhost){
    const bg=ctx.createRadialGradient(x-r*0.2,y-r*0.2,1,x,y,r);
    bg.addColorStop(0,'#fff8d0');bg.addColorStop(0.5,'#ffd700');bg.addColorStop(1,'#b8860b');
    ctx.fillStyle=bg;
  } else { ctx.fillStyle=def.color; }
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=isGhost?'rgba(255,255,255,0.45)':'rgba(255,255,255,0.22)';
  ctx.beginPath();ctx.arc(x-r*0.25,y-r*0.25,r*0.42,0,Math.PI*2);ctx.fill();
  ctx.font=`${r*1.1}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  const icons={triple:'🦘',timewarp:'⏱',shield:'🛡',magnet:'🧲',ghost:'👻',fake:'💀'};
  ctx.fillText(icons[def.id]||'⭐',x,y+1);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.globalAlpha=0.9+Math.sin(frame*0.08)*0.1;
  ctx.font=`bold ${isGhost?11:10}px var(--font-sans)`;
  ctx.fillStyle=isGhost?'#ffd700':fake?'#ff6666':'#fff';
  ctx.textAlign='center';
  ctx.fillText(fake?'Power-up!':isGhost?'✨ ULTRA RARE ✨':def.label.split(' ').slice(1).join(' '),x,y-r-(isGhost?10:6));
  ctx.textAlign='left';ctx.globalAlpha=1;ctx.restore();
}
function drawChili(x,y,w,h,color){
  ctx.save();ctx.translate(x+w/2,y+h);
  ctx.fillStyle='#3d7a2e';ctx.fillRect(-2,-h-6,4,10);
  ctx.fillStyle='#4e9e3a';
  ctx.beginPath();ctx.ellipse(-6,-h+2,7,3,-0.6,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(5,-h+3,6,2.5,0.5,0,Math.PI*2);ctx.fill();
  let bt,bm,bb,sh;
  if(color==='red'){bt='#ff2200';bm='#cc1a00';bb='#991200';sh='rgba(255,120,80,0.35)';}
  else if(color==='orange'){bt='#ff8800';bm='#e06000';bb='#b04400';sh='rgba(255,200,80,0.3)';}
  else{bt='#44bb22';bm='#2e8a14';bb='#1d5c0a';sh='rgba(120,255,80,0.25)';}
  const bw=w*0.55;
  const g2=ctx.createLinearGradient(-bw,-h,bw,0);
  g2.addColorStop(0,bt);g2.addColorStop(0.6,bm);g2.addColorStop(1,bb);
  ctx.fillStyle=g2;ctx.beginPath();ctx.moveTo(0,-h+2);
  ctx.bezierCurveTo(-bw*1.1,-h*0.7,-bw*0.9,-h*0.3,-bw*0.2,-h*0.05);
  ctx.quadraticCurveTo(0,h*0.04,bw*0.2,-h*0.05);
  ctx.bezierCurveTo(bw*0.9,-h*0.3,bw*1.1,-h*0.7,0,-h+2);ctx.closePath();ctx.fill();
  ctx.fillStyle=bb;ctx.beginPath();ctx.ellipse(0,-h*0.02,bw*0.25,h*0.06,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sh;ctx.beginPath();ctx.ellipse(-bw*0.3,-h*0.65,bw*0.2,h*0.12,-0.3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=bb;ctx.lineWidth=0.8;ctx.globalAlpha=0.5;
  ctx.beginPath();ctx.moveTo(bw*0.15,-h*0.85);ctx.quadraticCurveTo(bw*0.5,-h*0.5,bw*0.1,-h*0.1);ctx.stroke();
  ctx.globalAlpha=1;ctx.restore();
}
function drawRunner(x,y,w,h,frame){
  const cx=x+w/2;
  const isGhost=state.activePowerUp?.def.id==='ghost';
  const isTimewarp=state.activePowerUp?.def.id==='timewarp';
  const blinking=state.shieldCooldown>0&&Math.floor(state.shieldCooldown/4)%2===0;
  ctx.globalAlpha=isGhost?0.35:blinking?0.4:1;
  if(isGhost){
    ctx.save();
    const shimmer=0.3+Math.sin(frame*0.12)*0.2;
    ctx.fillStyle=`rgba(255,215,0,${shimmer})`;ctx.beginPath();ctx.roundRect(x,y,w,h,4);ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle='#3a7abf';ctx.beginPath();ctx.roundRect(x+2,y+h*0.42,w-4,h*0.58,[2,2,4,4]);ctx.fill();
  ctx.fillStyle='#2d5f94';ctx.fillRect(cx-4,y+h*0.42,8,6);
  ctx.fillStyle='#c8956b';ctx.fillRect(cx-4,y+h*0.32,8,h*0.13);
  ctx.fillStyle='#c8956b';ctx.beginPath();ctx.ellipse(cx,y+h*0.22,w*0.42,h*0.22,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a0522d';ctx.beginPath();ctx.ellipse(cx,y+h*0.08,w*0.38,h*0.13,0,0,Math.PI);ctx.fill();
  ctx.fillStyle='#b8632a';ctx.fillRect(cx-w*0.38,y+h*0.17,5,10);ctx.fillRect(cx+w*0.28,y+h*0.17,5,10);
  ctx.fillStyle='#b8632a';ctx.beginPath();ctx.ellipse(cx,y+h*0.35,w*0.36,h*0.12,0,0,Math.PI);ctx.fill();
  ctx.strokeStyle='#444';ctx.lineWidth=1.5;
  ctx.strokeRect(cx-w*0.38,y+h*0.17,w*0.3,h*0.1);ctx.strokeRect(cx+w*0.06,y+h*0.17,w*0.3,h*0.1);
  ctx.beginPath();
  ctx.moveTo(cx-w*0.08,y+h*0.2);ctx.lineTo(cx+w*0.06,y+h*0.2);
  ctx.moveTo(cx-w*0.38,y+h*0.2);ctx.lineTo(cx-w*0.44,y+h*0.18);
  ctx.moveTo(cx+w*0.36,y+h*0.2);ctx.lineTo(cx+w*0.44,y+h*0.18);
  ctx.stroke();
  ctx.fillStyle='#333';ctx.fillRect(cx-w*0.26,y+h*0.19,4,4);ctx.fillRect(cx+w*0.12,y+h*0.19,4,4);
  const la=Math.sin(frame*0.22)*5;
  ctx.fillStyle='#2d3a5e';ctx.fillRect(x+4,y+h*0.88,8,h*0.12+la);ctx.fillRect(x+w-12,y+h*0.88,8,h*0.12-la);
  ctx.fillStyle='#111';ctx.fillRect(x+2,y+h+la-1,12,5);ctx.fillRect(x+w-14,y+h-la-1,12,5);
  ctx.globalAlpha=1;
  if(state.shieldActive){
    ctx.save();ctx.strokeStyle='#ffcc00';ctx.lineWidth=2.5;
    ctx.globalAlpha=0.55+Math.sin(frame*0.15)*0.35;
    ctx.beginPath();ctx.ellipse(cx,y+h*0.5,w*0.85,h*0.65,0,0,Math.PI*2);ctx.stroke();
    ctx.lineWidth=1;ctx.globalAlpha=0.25+Math.sin(frame*0.15)*0.15;
    ctx.beginPath();ctx.ellipse(cx,y+h*0.5,w*0.7,h*0.55,0,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;ctx.restore();
  }
  if(isTimewarp){
    ctx.fillStyle='rgba(170,68,255,0.12)';
    ctx.fillRect(x-12,y+2,w,h-2);ctx.fillRect(x-26,y+4,w,h-4);ctx.fillRect(x-40,y+6,w,h-6);
  }
  if(isGhost){
    for(let i=1;i<=3;i++){ctx.fillStyle=`rgba(255,215,0,${0.08/i})`;ctx.fillRect(x-i*14,y,w,h);}
  }
}
function draw(){
  ctx.clearRect(0,0,W,H);
  drawLabBackground(state.frame);
  if(state.activePowerUp?.def.id==='timewarp'){ctx.fillStyle='rgba(80,20,160,0.08)';ctx.fillRect(0,0,W,H);}
  if(state.activePowerUp?.def.id==='ghost'){ctx.fillStyle='rgba(255,200,0,0.05)';ctx.fillRect(0,0,W,H);}
  if(state.deathFlash>0){ctx.fillStyle=`rgba(220,0,0,${state.deathFlash/18*0.55})`;ctx.fillRect(0,0,W,H);}
  if(state.goldFlash>0){ctx.fillStyle=`rgba(255,215,0,${state.goldFlash/22*0.4})`;ctx.fillRect(0,0,W,H);}
  for(let t of state.trails){ctx.fillStyle=`rgba(58,122,191,${t.life/10*0.2})`;ctx.fillRect(t.x-5,t.y-5,10,10);}
  for(let g of state.groups){g.peppers.forEach(p2=>drawChili(g.x+p2.dx,GROUND+28-p2.h,p2.w,p2.h,p2.color));}
  for(let pu of state.powerUpItems)drawPowerUpItem(pu,state.frame);
  for(let pt of state.particles){
    ctx.globalAlpha=pt.life/pt.maxLife;
    ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*(pt.life/pt.maxLife),0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  const p=state.player;
  drawRunner(p.x,p.y,p.w,p.h,state.frame);
  if(!state.running){
    ctx.fillStyle='rgba(232,236,240,0.84)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#223344';ctx.font='600 26px var(--font-sans)';ctx.textAlign='center';
    ctx.fillText("Dilt's Runner 🌶",W/2,H/2-28);
    ctx.font='400 13px var(--font-sans)';ctx.fillStyle='#556677';
    ctx.fillText('Jump for power-ups · Not all are friendly...',W/2,H/2+2);
    ctx.fillText('Tap the button below or press Space to start',W/2,H/2+20);
    ctx.textAlign='left';
  }
  if(state.over){
    ctx.fillStyle='rgba(232,236,240,0.88)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#cc2200';ctx.font='600 22px var(--font-sans)';
    ctx.fillText('Too spicy! 🌶',W/2,H/2-22);
    ctx.fillStyle='#223344';ctx.font='400 14px var(--font-sans)';
    ctx.fillText('Score: '+Math.floor(state.score/3)+'  ·  Best: '+Math.floor(state.best/3),W/2,H/2+8);
    ctx.fillStyle='#556677';ctx.font='400 13px var(--font-sans)';
    ctx.fillText('Tap the button to play again',W/2,H/2+30);
    ctx.textAlign='left';
  }
}
draw();
</script>
